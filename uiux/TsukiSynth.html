<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TsukiSynth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;500&display=swap" />
  <style>
    /* ─────── reset & shell ─────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      color: #e0e0e0;
      background: #07070d;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ─────── page background variants ─────── */
    .page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    .page::before {
      content: "";
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-twilight::before {
      background:
        radial-gradient(ellipse at 30% 10%, #1a1830 0%, #0c0c18 45%, #07070d 100%),
        radial-gradient(circle at 80% 90%, rgba(196,154,108,0.05) 0%, transparent 50%);
    }
    .bg-midnight::before {
      background: radial-gradient(ellipse at 50% 30%, #0e0f1c 0%, #050509 70%);
    }
    .bg-ink::before {
      background: linear-gradient(180deg, #0a0a13 0%, #04040a 100%);
    }

    .noise-tex {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: 0.04;
      pointer-events: none;
      mix-blend-mode: overlay;
      z-index: 1;
    }

    /* ─────── plugin window ─────── */
    .plugin {
      position: relative;
      z-index: 2;
      width: 540px;
      background: linear-gradient(180deg, #1a1a2e 0%, #16162a 100%);
      border: 0.5px solid #2a2a4a;
      border-radius: 8px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.4),
        0 24px 60px -16px rgba(0,0,0,0.7),
        0 8px 28px -10px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.04),
        inset 0 -1px 0 rgba(0,0,0,0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .plugin-halo {
      position: absolute;
      top: -120px; right: -120px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,184,150,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─────── density variants ─────── */
    .density-compact .plugin > * { padding-top: 8px; padding-bottom: 8px; }
    .density-spacious .plugin > * { padding-top: 14px; padding-bottom: 14px; }

    /* ─────── title bar ─────── */
    .title-bar {
      padding: 16px 20px 10px;
      position: relative;
      z-index: 1;
      border-bottom: 0.5px solid #232340;
      background: linear-gradient(180deg, rgba(255,255,255,0.015) 0%, transparent 100%);
    }
    .title-left {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 4px;
    }
    .title-moon { display: inline-flex; align-items: center; transform: translateY(2px); }
    .wordmark {
      margin: 0;
      font-family: "IBM Plex Sans", sans-serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 0.04em;
      background: linear-gradient(180deg, #f0e8d8 0%, #c49a6c 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      line-height: 1;
    }
    .title-sub {
      display: flex; gap: 7px; align-items: center;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #667788;
      font-weight: 500;
    }
    .sub-engine { color: #8899aa; }
    .sub-pipe { color: #3a3a5a; }
    .sub-tag { color: #667788; }

    /* ─────── preset row ─────── */
    .preset-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #14142a;
      border-bottom: 0.5px solid #232340;
      position: relative;
      z-index: 1;
    }
    .preset-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; position: relative; }
    .preset-right { display: flex; align-items: center; gap: 10px; }
    .preset-step { display: flex; flex-direction: column; gap: 2px; }
    .step-btn {
      width: 18px; height: 14px;
      background: #1e1e36;
      border: 0.5px solid #2a2a4a;
      border-radius: 3px;
      color: #7b8ea8;
      display: flex; align-items: center; justify-content: center;
      cursor: default; padding: 0;
    }
    .step-btn:hover { color: #c49a6c; border-color: #c49a6c; }

    .preset-pill {
      flex: 1;
      display: flex; align-items: center; gap: 0;
      height: 30px;
      padding: 0 10px 0 0;
      background: #1e1e36;
      border: 0.5px solid #2a2a4a;
      border-radius: 5px;
      color: #d4b896;
      font-family: inherit;
      font-size: 12px;
      cursor: default;
      transition: border-color 0.18s;
      min-width: 0;
    }
    .preset-pill:hover { border-color: #3d3d5e; }
    .preset-pill.preset-open { border-color: #c49a6c; }
    .preset-key {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.18em;
      color: #556677;
      padding: 0 10px;
      height: 100%; display: flex; align-items: center;
      background: rgba(0,0,0,0.18);
      border-right: 0.5px solid #2a2a4a;
      border-radius: 4px 0 0 4px;
    }
    .preset-divider { width: 8px; }
    .preset-name {
      font-weight: 500;
      color: #e0d2b8;
      flex: 1; text-align: left;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .preset-bank {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #556677;
      padding: 2px 6px;
      border: 0.5px solid #2a2a4a;
      border-radius: 3px;
      margin: 0 8px;
      text-transform: uppercase;
    }
    .preset-chev { color: #c49a6c; }
    .preset-flash {
      animation: presetFlash 0.36s ease-out;
    }
    @keyframes presetFlash {
      0% { background: rgba(196,154,108,0.28); border-color: #c49a6c; }
      100% { background: #1e1e36; border-color: #2a2a4a; }
    }
    .preset-scrim {
      position: fixed; inset: 0; z-index: 50;
    }
    .preset-menu {
      position: absolute;
      top: calc(100% + 4px); left: 0; right: 0;
      background: #1a1a2e;
      border: 0.5px solid #3a3a5a;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.5);
      padding: 4px;
      z-index: 60;
      max-height: 280px;
      overflow-y: auto;
    }
    .preset-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px;
      border-radius: 4px;
      cursor: default;
      font-size: 12px;
      color: #ccc;
    }
    .preset-item:hover { background: rgba(196,154,108,0.10); color: #e0d2b8; }
    .preset-item-active { background: rgba(196,154,108,0.18); color: #d4b896; }
    .preset-engine-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .preset-item-name { flex: 1; }
    .preset-item-bank {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #556677;
      text-transform: uppercase;
    }

    .preset-tools { display: flex; gap: 4px; }

    /* ─────── A/B compare ─────── */
    .ab-compare {
      display: flex;
      align-items: center;
      gap: 1px;
      background: #14142a;
      border: 0.5px solid #2a2a4a;
      border-radius: 4px;
      padding: 1px;
    }
    .ab-btn {
      width: 22px; height: 22px;
      background: transparent;
      border: 0;
      color: #7b8ea8;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      border-radius: 3px;
      cursor: default;
    }
    .ab-btn:hover { color: #d4b896; }
    .ab-active {
      background: rgba(196,154,108,0.22);
      color: #e8c88a;
    }
    .ab-copy {
      width: 22px; height: 22px;
      background: transparent;
      border: 0;
      border-left: 0.5px solid #2a2a4a;
      color: #556677;
      cursor: default;
      display: flex; align-items: center; justify-content: center;
    }
    .ab-copy:hover { color: #c49a6c; }

    /* ─────── icon buttons ─────── */
    .icon-btn {
      width: 24px; height: 24px;
      background: transparent;
      border: 0.5px solid #2a2a4a;
      border-radius: 4px;
      color: #7b8ea8;
      cursor: default;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { color: #c49a6c; border-color: #3a3a5a; background: rgba(196,154,108,0.06); }

    /* ─────── engine tabs ─────── */
    .engine-tabs {
      display: flex;
      gap: 2px;
      padding: 10px 16px 0;
      background: #14142a;
      position: relative;
      z-index: 1;
    }
    .tab {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      height: 32px;
      background: transparent;
      border: 0;
      color: #667788;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: default;
      position: relative;
      transition: color 0.15s, background 0.15s;
    }
    .tab-icon {
      display: inline-flex; align-items: center;
      color: currentColor;
      opacity: 0.65;
    }
    .tab:hover { color: #aab; background: rgba(255,255,255,0.025); }

    /* filled */
    .tab-filled {
      border-radius: 5px 5px 0 0;
      border: 0.5px solid transparent;
      border-bottom: 0;
    }
    .tab-filled.tab-active {
      background: var(--tab-accent-15);
      color: var(--tab-accent);
      border-color: var(--tab-accent-15);
      box-shadow: 0 -1px 0 var(--tab-accent) inset, 0 0 14px -4px var(--tab-accent);
    }
    .tab-filled.tab-active .tab-icon { opacity: 1; }

    /* underline */
    .tab-underline {
      border-radius: 0;
    }
    .tab-underline.tab-active {
      color: var(--tab-accent);
    }
    .tab-underline.tab-active::after {
      content: "";
      position: absolute;
      left: 14%; right: 14%; bottom: 0;
      height: 2px;
      background: var(--tab-accent);
      box-shadow: 0 0 8px var(--tab-accent);
      border-radius: 1px;
    }
    .tab-underline.tab-active .tab-icon { opacity: 1; }

    /* pill */
    .tab-pill {
      border-radius: 999px;
      margin: 4px 1px;
      height: 28px;
    }
    .tab-pill.tab-active {
      background: var(--tab-accent);
      color: #fff;
      box-shadow: 0 0 14px -2px var(--tab-accent);
    }
    .tab-pill.tab-active .tab-icon { opacity: 1; color: #fff; }

    /* ─────── divider ─────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      margin-bottom: 10px;
      margin-top: 4px;
    }
    .divider-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #556677;
    }
    .divider-sub {
      font-size: 9px;
      color: #344;
      letter-spacing: 0.06em;
      font-family: "IBM Plex Mono", monospace;
    }
    .divider-line {
      flex: 1;
      height: 0.5px;
      background: linear-gradient(90deg, #2a2a4a 0%, transparent 100%);
    }

    /* ─────── engine section ─────── */
    .engine-section {
      padding: 12px 0 6px;
      background: linear-gradient(180deg, #16162a 0%, #131326 100%);
      border-top: 0.5px solid #232340;
      position: relative;
      z-index: 1;
    }
    .param-grid {
      display: flex; flex-direction: column;
      gap: 6px;
      padding: 0 16px;
      animation: fadeContent 220ms ease-out;
    }
    @keyframes fadeContent {
      from { opacity: 0; transform: translateY(2px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .param-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: center;
    }
    .param-cell {
      display: flex; align-items: center; justify-content: center;
      min-height: 70px;
      padding: 4px 0;
    }
    .param {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px;
      width: 100%;
    }
    .param-knob { gap: 3px; }
    .param-combo { width: 88%; }
    .param-spacer { width: 100%; height: 100%; }

    .param-label {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: #8899aa;
      text-transform: uppercase;
      text-align: center;
    }
    .density-compact .param-cell { min-height: 60px; }
    .density-spacious .param-cell { min-height: 78px; }

    /* ─────── knob ─────── */
    .knob {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px;
    }
    .knob-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: #8899aa;
      text-transform: uppercase;
      font-weight: 600;
    }
    .knob-dial { display: block; user-select: none; }
    .knob-value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      color: #d4b896;
      letter-spacing: 0.02em;
      transition: color 0.12s;
      margin-top: 2px;
      min-height: 1em;
    }
    .knob-value-active { color: #e8c88a; text-shadow: 0 0 6px rgba(232,200,138,0.5); }
    .knob-disabled .knob-value { color: #444466; }

    /* ─────── ComboBox ─────── */
    .combo-wrap {
      width: 100%;
      display: flex; flex-direction: column; gap: 5px;
      align-items: center;
    }
    .combo-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: #8899aa;
      text-transform: uppercase;
      font-weight: 600;
    }
    .combo {
      width: 100%;
      height: 26px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      background: #1e1e36;
      border: 0.5px solid #333355;
      border-radius: 4px;
      color: #cccccc;
      font-family: inherit;
      font-size: 11px;
      cursor: default;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .combo:hover { border-color: var(--combo-accent); background: #21213c; }
    .combo-open { border-color: var(--combo-accent); background: #21213c; }
    .combo-val {
      flex: 1; text-align: left;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .combo-chev { flex-shrink: 0; transition: transform 0.18s; }
    .combo-open .combo-chev { transform: rotate(180deg); }
    .combo-disabled { opacity: 0.4; pointer-events: none; }
    .combo-menu {
      position: absolute;
      top: calc(100% + 4px); left: 0; right: 0;
      background: #20203a;
      border: 0.5px solid #3a3a5a;
      border-radius: 5px;
      padding: 3px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      z-index: 30;
    }
    .combo-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px 5px 12px;
      border-radius: 3px;
      font-size: 11px;
      color: #aabbcc;
      cursor: default;
      position: relative;
    }
    .combo-item:hover { background: rgba(196,154,108,0.10); color: #e0d2b8; }
    .combo-item-active { color: var(--combo-accent); }
    .combo-bar {
      position: absolute;
      left: 4px; top: 6px; bottom: 6px;
      width: 2px;
      background: var(--combo-accent);
      border-radius: 1px;
    }

    /* ─────── effects section ─────── */
    .effects-section {
      padding: 6px 0 12px;
      background: #11111e;
      border-top: 0.5px solid #232340;
      position: relative;
      z-index: 1;
    }
    .effects-row {
      display: grid;
      grid-template-columns: 1.6fr 2.2fr 1.7fr;
      gap: 8px;
      padding: 0 16px;
    }
    .effect-panel {
      background: #1a1a30;
      border: 0.5px solid #232342;
      border-radius: 5px;
      padding: 8px 8px 6px;
      transition: opacity 0.2s;
    }
    .effect-dimmed { opacity: 0.55; }
    .effect-header {
      margin-bottom: 4px;
      padding-left: 2px;
    }
    .effect-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #6a7a8a;
    }
    .effect-knobs {
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      gap: 4px;
    }
    .param-fx { gap: 2px; }
    .fx-label {
      font-size: 8.5px;
      letter-spacing: 0.14em;
      color: #6a7a8a;
    }
    .param-fx .knob-value { font-size: 9px; }

    /* ─────── MIDI keyboard ─────── */
    .kb-foot {
      position: relative;
      z-index: 1;
      border-top: 0.5px solid #232340;
      background: #0c0c18;
      padding: 8px 14px 12px;
    }
    .midi-kb {
      position: relative;
      height: 56px;
      width: 100%;
      border-radius: 3px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.02);
      background: #0a0a14;
      padding: 2px;
    }
    .midi-whites {
      display: flex;
      height: 100%;
      gap: 1px;
    }
    .midi-white {
      flex-shrink: 0;
      background: linear-gradient(180deg, #d8cdb6 0%, #c4b89e 80%, #a89c82 100%);
      border-radius: 0 0 2px 2px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.4);
      cursor: default;
      position: relative;
      transition: background 0.08s;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 3px;
    }
    .midi-white:hover {
      background: linear-gradient(180deg, #e8dec8 0%, #d2c6ac 80%, #b8aa90 100%);
    }
    .midi-white.midi-active {
      background: linear-gradient(180deg, var(--kb-accent), color-mix(in oklch, var(--kb-accent), #e8c88a 30%));
      box-shadow: inset 0 -2px 6px rgba(0,0,0,0.25), 0 0 12px var(--kb-accent);
    }
    .midi-c-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 7px;
      color: #6a5e44;
      letter-spacing: 0.04em;
      pointer-events: none;
    }
    .midi-blacks {
      position: absolute;
      top: 2px; left: 2px; right: 2px;
      height: 64%;
      pointer-events: none;
    }
    .midi-black {
      position: absolute;
      top: 0;
      height: 100%;
      background: linear-gradient(180deg, #2a2535 0%, #14111e 100%);
      border-radius: 0 0 2px 2px;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05), 0 1px 2px rgba(0,0,0,0.5);
      cursor: default;
      pointer-events: auto;
      transition: background 0.08s;
    }
    .midi-black:hover {
      background: linear-gradient(180deg, #3a3245 0%, #1c1828 100%);
    }
    .midi-black.midi-active {
      background: linear-gradient(180deg, var(--kb-accent), #5a4a30);
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.4), 0 0 10px var(--kb-accent);
    }

    /* ─────── toast ─────── */
    .toast {
      position: absolute;
      top: 56px; left: 50%;
      transform: translateX(-50%);
      background: rgba(20,20,42,0.92);
      border: 0.5px solid #c49a6c;
      color: #d4b896;
      font-size: 10.5px;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border-radius: 4px;
      z-index: 80;
      animation: toastIn 0.18s ease-out, toastOut 0.32s 1s ease-in forwards;
      box-shadow: 0 6px 14px rgba(0,0,0,0.5);
    }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, -4px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes toastOut { to { opacity: 0; } }

    /* ─────── hint chip ─────── */
    .hint {
      position: relative;
      z-index: 2;
      display: flex; align-items: center; gap: 8px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      color: #4a5566;
      letter-spacing: 0.04em;
    }
    .hint-key {
      color: #7b8ea8;
      padding: 2px 6px;
      border: 0.5px solid #2a2a4a;
      border-radius: 3px;
      background: rgba(20,20,42,0.5);
    }
    .hint-sep { color: #2a2a4a; }
  </style>
